services:
  assistant:
    image: ${ASSISTANT_IMAGE:-atlas-local-rag:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-assistant
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:${APP_PORT:-8501}:8501"
    environment:
      DATA_DIR: /app/data
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CHAT_MODEL: ${CHAT_MODEL:-qwen2.5:7b-instruct-q4_K_M}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-base}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      ENABLE_RERANKER: ${ENABLE_RERANKER:-true}
      MIN_RELEVANCE: ${MIN_RELEVANCE:-0.08}
      OCR_PDF_MODE: ${OCR_PDF_MODE:-auto}
      OCR_DPI: ${OCR_DPI:-220}
      APP_PASSWORD: ${APP_PASSWORD:-}
      HF_HOME: /models/huggingface
      EASYOCR_MODULE_PATH: /models/easyocr
    volumes:
      - ./data:/app/data
      - ./model_cache:/models
    extra_hosts:
      - "host.docker.internal:host-gateway"

  caddy:
    image: caddy:2.10-alpine
    profiles: ["remote"]
    restart: unless-stopped
    depends_on:
      assistant:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
